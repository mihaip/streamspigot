# Type-generation-only Wrangler config.
# Keep bindings in sync with wrangler.toml. This intentionally omits `main`
# and `assets.directory` so generated types do not import build output from
# .svelte-kit/cloudflare during `svelte-check`.
"$schema" = "./node_modules/wrangler/config-schema.json"
name = "streamspigot"
account_id = "2ccb840de076261467812cbc32f8aa47"
workers_dev = true
compatibility_date = "2024-04-13"
compatibility_flags = ["nodejs_als"]

[assets]
binding = "ASSETS"

[[kv_namespaces]]
binding = "STREAMSPIGOT"
id = "0d58678cdea94a018dc79669f6bc9a76"

[observability]
enabled = true
head_sampling_rate = 1
