# Type-generation-only Wrangler config.
# Keep bindings in sync with wrangler.toml. This intentionally omits `main`
# and `assets.directory` so generated types do not import build output from
# .svelte-kit/cloudflare during `svelte-check`.
"$schema" = "./node_modules/wrangler/config-schema.json"
name = "streamspigot"
account_id = "2ccb840de076261467812cbc32f8aa47"
workers_dev = true
compatibility_date = "2026-05-14"
compatibility_flags = ["nodejs_als", "nodejs_compat"]

[assets]
binding = "ASSETS"

[[kv_namespaces]]
binding = "STREAMSPIGOT"
id = "0d58678cdea94a018dc79669f6bc9a76"

[[durable_objects.bindings]]
name = "SKY_OAUTH_LOCK"
class_name = "SkyOAuthLock"

[[migrations]]
tag = "sky-oauth-lock-v1"
new_sqlite_classes = ["SkyOAuthLock"]

[observability]
enabled = true
head_sampling_rate = 1
